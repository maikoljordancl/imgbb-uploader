<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgBB Uploader - Ordenado</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #273449;
            --border: #334155;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #38bdf8;
            --success: #34d399;
            --danger: #f87171;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(ellipse at 20% 20%, rgba(56,189,248,0.06) 0%, transparent 55%),
                              radial-gradient(ellipse at 80% 70%, rgba(56,189,248,0.04) 0%, transparent 55%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 820px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 40px;
        }
        .header {
            text-align: center;
        }
        .header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            outline: none;
        }
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn:disabled {
            opacity: 0.45;
            pointer-events: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #0c1a2b;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            background: var(--surface2);
            cursor: pointer;
            transition: 0.2s;
        }
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: #1e3348;
        }
        .image-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .image-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface2);
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: grab;
            user-select: none;
        }
        .image-item:hover { border-color: var(--border); }
        .image-item .index { font-weight: 700; color: var(--accent); min-width: 24px; }
        .image-item img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; }
        .image-item .name { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .results { display: flex; flex-direction: column; gap: 8px; }
        .result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface2);
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .result-item .num { font-weight: 700; color: var(--success); min-width: 24px; }
        .result-item a { color: var(--accent); word-break: break-all; font-size: 0.85rem; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 24px;
            border-radius: 20px;
            border: 1px solid var(--success);
            z-index: 999;
            animation: fadeInOut 2.5s ease;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }
        .error-message { color: var(--danger); font-size: 0.8rem; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><span>🖼️</span> ImgBB Uploader</div>
            <p style="color:var(--text2);">Sube imágenes en orden y obtén los links</p>
        </div>

        <!-- API Key -->
        <div class="card">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                <span>🔑 API Key</span>
                <span id="apiStatus" style="color:var(--success); font-size:0.8rem;">✅ Lista</span>
            </div>
            <div class="input-group">
                <input type="text" id="apiKeyInput" placeholder="Tu API Key de ImgBB" />
                <button class="btn btn-outline" id="saveKeyBtn">💾 Guardar</button>
                <button class="btn btn-outline" id="testKeyBtn">🔍 Probar</button>
            </div>
            <p style="font-size:0.75rem; color:var(--text2); margin-top:8px;">Clave incluida: 7199773e48b68ee866c35917bd2e1e82</p>
        </div>

        <!-- Subida -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span>📤 Imágenes <span id="imageCount">(0)</span></span>
            </div>
            <div class="drop-zone" id="dropZone">
                <div style="font-size:2.5rem;">📁</div>
                <p>Arrastra imágenes aquí o <span id="browseLink" style="color:var(--accent); text-decoration:underline;">selecciónalas</span></p>
                <p style="font-size:0.7rem;">JPG, PNG, GIF, WEBP · Máx 32MB</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" multiple hidden />
            <div class="image-list" id="imageList"></div>
            <div style="display: flex; gap: 10px; margin-top: 16px;">
                <button class="btn btn-primary" id="uploadBtn" disabled>🚀 Subir</button>
                <button class="btn btn-outline" id="clearAllBtn" disabled>🗑️ Limpiar</button>
            </div>
            <div id="progressContainer" style="display:none; margin-top:12px;">
                <div style="background:var(--surface2); border-radius:10px; height:6px; overflow:hidden;">
                    <div id="progressBar" style="width:0%; height:100%; background:var(--accent); transition: width 0.3s;"></div>
                </div>
                <p id="progressText" style="text-align:center; font-size:0.8rem; margin-top:4px;"></p>
            </div>
        </div>

        <!-- Resultados -->
        <div class="card" id="resultsCard" style="display:none;">
            <div style="margin-bottom:12px;">✅ <span>Enlaces generados (en orden)</span></div>
            <div class="results" id="resultsList"></div>
            <div style="display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;">
                <button class="btn btn-outline" id="copyAllBtn">📋 Copiar links</button>
                <button class="btn btn-outline" id="copyBBBtn">📋 BBCode</button>
                <button class="btn btn-outline" id="copyHTMLBtn">📋 HTML</button>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const DEFAULT_KEY = '7199773e48b68ee866c35917bd2e1e82';
            const apiKeyInput = document.getElementById('apiKeyInput');
            const apiStatus = document.getElementById('apiStatus');
            const saveKeyBtn = document.getElementById('saveKeyBtn');
            const testKeyBtn = document.getElementById('testKeyBtn');
            const dropZone = document.getElementById('dropZone');
            const browseLink = document.getElementById('browseLink');
            const fileInput = document.getElementById('fileInput');
            const imageList = document.getElementById('imageList');
            const imageCount = document.getElementById('imageCount');
            const uploadBtn = document.getElementById('uploadBtn');
            const clearAllBtn = document.getElementById('clearAllBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const resultsCard = document.getElementById('resultsCard');
            const resultsList = document.getElementById('resultsList');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const copyBBBtn = document.getElementById('copyBBBtn');
            const copyHTMLBtn = document.getElementById('copyHTMLBtn');

            let files = [];
            let results = [];
            let idCounter = 0;

            // Cargar clave guardada
            const saved = localStorage.getItem('imgbb_api_key');
            apiKeyInput.value = saved || DEFAULT_KEY;
            apiStatus.textContent = saved ? '✅ Guardada' : '✅ Predeterminada';

            saveKeyBtn.addEventListener('click', () => {
                const key = apiKeyInput.value.trim();
                if (key) {
                    localStorage.setItem('imgbb_api_key', key);
                    apiStatus.textContent = '✅ Guardada';
                    toast('Clave guardada');
                } else {
                    localStorage.removeItem('imgbb_api_key');
                    apiKeyInput.value = DEFAULT_KEY;
                    apiStatus.textContent = '✅ Predeterminada';
                }
            });

            // Test de clave (solicitud ligera)
            testKeyBtn.addEventListener('click', async () => {
                const key = apiKeyInput.value.trim();
                if (!key) return toast('⚠️ Ingresa una clave');
                testKeyBtn.disabled = true;
                testKeyBtn.textContent = '⏳ Probando...';
                try {
                    // Enviamos un archivo mínimo válido (1x1 píxel PNG)
                    const canvas = document.createElement('canvas');
                    canvas.width = 1;
                    canvas.height = 1;
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                    const form = new FormData();
                    form.append('key', key);
                    form.append('image', blob, 'test.png');
                    const resp = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
                    const data = await resp.json();
                    if (data.success) {
                        toast('✅ Clave válida');
                    } else {
                        toast('❌ ' + (data.status_txt || 'Error desconocido'));
                    }
                } catch (err) {
                    toast('❌ Error de red: ' + err.message);
                    console.error(err);
                } finally {
                    testKeyBtn.disabled = false;
                    testKeyBtn.textContent = '🔍 Probar';
                }
            });

            // Gestión de archivos
            dropZone.addEventListener('click', () => fileInput.click());
            browseLink.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) {
                    addFiles(Array.from(fileInput.files));
                    fileInput.value = '';
                }
            });

            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                const dropped = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.type === '');
                if (dropped.length) addFiles(dropped);
                else toast('⚠️ No se detectaron imágenes');
            });

            document.addEventListener('paste', (e) => {
                const items = e.clipboardData?.items;
                if (!items) return;
                const imgItems = [];
                for (const item of items) {
                    if (item.type.startsWith('image/')) imgItems.push(item.getAsFile());
                }
                if (imgItems.length) {
                    e.preventDefault();
                    addFiles(imgItems);
                }
            });

            function addFiles(newFiles) {
                for (const f of newFiles) {
                    if (f.size > 32 * 1024 * 1024) {
                        toast(`⚠️ "${f.name}" supera 32MB`);
                        continue;
                    }
                    files.push({
                        id: idCounter++,
                        file: f,
                        objectURL: URL.createObjectURL(f)
                    });
                }
                renderFiles();
                results = [];
                resultsCard.style.display = 'none';
            }

            function renderFiles() {
                imageList.innerHTML = '';
                imageCount.textContent = `(${files.length})`;
                uploadBtn.disabled = files.length === 0;
                clearAllBtn.disabled = files.length === 0;

                if (!files.length) {
                    imageList.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2);">🖼️ Sin imágenes</div>';
                    return;
                }

                files.forEach((f, idx) => {
                    const div = document.createElement('div');
                    div.className = 'image-item';
                    div.draggable = true;
                    div.dataset.index = idx;
                    div.innerHTML = `
                        <span style="cursor:grab;">⋮</span>
                        <span class="index">${idx+1}</span>
                        <img src="${f.objectURL}" alt="thumb" />
                        <span class="name">${escapeHTML(f.file.name)}</span>
                        <span style="font-size:0.7rem;color:var(--text2);">${(f.file.size/1024).toFixed(1)} KB</span>
                        <button class="btn btn-outline" data-action="up" data-index="${idx}" style="padding:4px 8px;">▲</button>
                        <button class="btn btn-outline" data-action="down" data-index="${idx}" style="padding:4px 8px;">▼</button>
                        <button class="btn btn-outline" data-action="remove" data-index="${idx}" style="color:var(--danger);padding:4px 8px;">✕</button>
                    `;

                    div.addEventListener('dragstart', (e) => {
                        draggedIdx = idx;
                        div.classList.add('dragging');
                    });
                    div.addEventListener('dragover', (e) => e.preventDefault());
                    div.addEventListener('drop', (e) => {
                        e.preventDefault();
                        const target = parseInt(div.dataset.index);
                        if (draggedIdx !== undefined && target !== draggedIdx) {
                            reorder(draggedIdx, target);
                        }
                        draggedIdx = undefined;
                    });
                    div.addEventListener('dragend', () => div.classList.remove('dragging'));
                    div.addEventListener('click', (e) => {
                        const btn = e.target.closest('[data-action]');
                        if (!btn) return;
                        const idx = parseInt(btn.dataset.index);
                        if (btn.dataset.action === 'up') move(idx, -1);
                        else if (btn.dataset.action === 'down') move(idx, 1);
                        else if (btn.dataset.action === 'remove') removeFile(idx);
                    });

                    imageList.appendChild(div);
                });
            }
            let draggedIdx;

            function reorder(from, to) {
                const [moved] = files.splice(from, 1);
                files.splice(to, 0, moved);
                renderFiles();
                results = [];
                resultsCard.style.display = 'none';
            }
            function move(idx, dir) {
                const newIdx = idx + dir;
                if (newIdx >= 0 && newIdx < files.length) reorder(idx, newIdx);
            }
            function removeFile(idx) {
                URL.revokeObjectURL(files[idx].objectURL);
                files.splice(idx, 1);
                renderFiles();
                results = [];
                resultsCard.style.display = 'none';
            }

            clearAllBtn.addEventListener('click', () => {
                if (!files.length) return;
                if (confirm('¿Borrar todas las imágenes de la lista?')) {
                    files.forEach(f => URL.revokeObjectURL(f.objectURL));
                    files = [];
                    renderFiles();
                }
            });

            // Subida de imágenes
            uploadBtn.addEventListener('click', async () => {
                const key = apiKeyInput.value.trim();
                if (!key) return toast('⚠️ API Key requerida');
                if (!files.length) return;

                uploadBtn.disabled = true;
                clearAllBtn.disabled = true;
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                progressText.textContent = `0 / ${files.length}`;
                results = [];
                resultsList.innerHTML = '';

                for (let i = 0; i < files.length; i++) {
                    const entry = files[i];
                    progressText.textContent = `Subiendo ${i+1}/${files.length}: ${entry.file.name}`;
                    try {
                        const form = new FormData();
                        form.append('key', key);
                        form.append('image', entry.file, entry.file.name);
                        const resp = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
                        const data = await resp.json();
                        if (data.success) {
                            results.push({ url: data.data.url, thumb: data.data.thumb?.url || data.data.url, name: entry.file.name });
                        } else {
                            throw new Error(data.status_txt || 'Error de ImgBB');
                        }
                    } catch (err) {
                        results.push({ url: null, name: entry.file.name, error: err.message });
                        console.error(`Fallo al subir ${entry.file.name}:`, err);
                    }
                    progressBar.style.width = `${Math.round(((i+1)/files.length)*100)}%`;
                }

                progressText.textContent = results.every(r => r.url) ? '✅ Subida completa' : 'Completado con errores';
                renderResults();
                uploadBtn.disabled = false;
                clearAllBtn.disabled = false;
            });

            function renderResults() {
                resultsList.innerHTML = '';
                resultsCard.style.display = 'block';
                results.forEach((r, i) => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    if (r.error) {
                        div.innerHTML = `<span class="num" style="color:var(--danger);">${i+1}</span>
                            <span style="color:var(--danger);">❌ ${escapeHTML(r.name)}: ${escapeHTML(r.error)}</span>`;
                    } else {
                        div.innerHTML = `<span class="num">${i+1}</span>
                            <img src="${r.thumb}" style="width:32px;height:32px;border-radius:4px;" onerror="this.style.display='none'" />
                            <a href="${r.url}" target="_blank">${r.url}</a>
                            <button class="btn btn-outline copy-single" data-url="${escapeHTML(r.url)}" style="padding:4px 8px;">📋</button>`;
                        div.querySelector('.copy-single').addEventListener('click', function(e) {
                            e.stopPropagation();
                            copyText(this.dataset.url);
                            toast('Link copiado');
                        });
                    }
                    resultsList.appendChild(div);
                });
                resultsCard.scrollIntoView({ behavior: 'smooth' });
            }

            // Copiado masivo
            copyAllBtn.addEventListener('click', () => {
                const urls = results.filter(r => r.url).map(r => r.url);
                if (!urls.length) return toast('Sin links');
                copyText(urls.join('\n'));
                toast(`${urls.length} links copiados`);
            });
            copyBBBtn.addEventListener('click', () => {
                const bb = results.filter(r => r.url).map(r => `[img]${r.url}[/img]`).join('\n');
                if (!bb) return toast('Sin links');
                copyText(bb);
                toast('BBCode copiado');
            });
            copyHTMLBtn.addEventListener('click', () => {
                const html = results.filter(r => r.url).map(r => `<img src="${r.url}" alt="${escapeHTML(r.name)}" />`).join('\n');
                if (!html) return toast('Sin links');
                copyText(html);
                toast('HTML copiado');
            });

            function copyText(text) {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            }
            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
            function escapeHTML(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }
            function toast(msg) {
                const old = document.querySelector('.toast');
                if (old) old.remove();
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2500);
            }

            renderFiles();
        })();
    </script>
</body>
</html>
